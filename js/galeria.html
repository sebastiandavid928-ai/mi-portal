    <link rel="stylesheet" href="css/style.css">
</head>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html">Mente Sana</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">

    <main class="container my-5">
        <div class="text-center mb-5">
            <h1 style="color: var(--color-primario);">Galería de Bienestar</h1>
            <p class="lead">Encuentra inspiración visual para tu tranquilidad diaria.</p>
        </div>

        <section class="row justify-content-center mb-5">
            <div class="col-lg-8 text-center">
                <h3 class="mb-3">Momento de Relajación</h3>
                <div class="ratio ratio-16x9 shadow rounded overflow-hidden">
                    <iframe src="https://www.youtube.com/embed/inpok4MKVLM" title="Video de meditación" allowfullscreen></iframe>
                </div>
            </div>
        </section>

        <hr class="mb-5">

        <section class="row g-4">
            <div class="col-md-4">
                <figure class="figure w-100">
                    <img src="https://images.unsplash.com/photo-1545205597-3d9d02c29597?auto=format&fit=crop&w=600&q=80" class="figure-img img-fluid rounded shadow-sm w-100" alt="Persona meditando al aire libre">
                    <figcaption class="figure-caption text-center mt-2">Conexión con la naturaleza.</figcaption>
                </figure>
            </div>
            <div class="col-md-4">
                <figure class="figure w-100">
                    <img src="https://images.unsplash.com/photo-1494597564530-871f2b93ac55?auto=format&fit=crop&w=600&q=80" class="figure-img img-fluid rounded shadow-sm w-100" alt="Cuaderno de notas para journaling">
                    <figcaption class="figure-caption text-center mt-2">Journaling y autodescubrimiento.</figcaption>
                </figure>
            </div>
            <div class="col-md-4">
                <figure class="figure w-100">
                    <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&w=600&q=80" class="figure-img img-fluid rounded shadow-sm w-100" alt="Ejercicio físico saludable">
                    <figcaption class="figure-caption text-center mt-2">Cuerpo sano, mente sana.</figcaption>
                </figure>
            </div>
            <div class="col-md-4">
                <figure class="figure w-100">
                    <img src="https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?auto=format&fit=crop&w=600&q=80" class="figure-img img-fluid rounded shadow-sm w-100" alt="Caminata en la montaña">
                    <figcaption class="figure-caption text-center mt-2">Superando nuevos límites.</figcaption>
                </figure>
            </div>
            <div class="col-md-4">
                <figure class="figure w-100">
                    <img src="https://images.unsplash.com/photo-1512438248247-f0f6a5a8d7f6?auto=format&fit=crop&w=600&q=80" class="figure-img img-fluid rounded shadow-sm w-100" alt="Taza de té y libros">
                    <figcaption class="figure-caption text-center mt-2">Momentos de paz y lectura.</figcaption>
                </figure>
            </div>
            <div class="col-md-4">
                <figure class="figure w-100">
                    <img src="https://images.unsplash.com/photo-1522845015757-50bce044e5da?auto=format&fit=crop&w=600&q=80" class="figure-img img-fluid rounded shadow-sm w-100" alt="Grupo de personas apoyándose">
